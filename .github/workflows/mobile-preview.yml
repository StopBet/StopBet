name: Mobile Preview

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/shared-types/**'

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('apps/mobile/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Build APK
        run: cd apps/mobile/android && ./gradlew assembleRelease --no-daemon

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: equipo
          file: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          releaseNotes: "Build automático del commit ${{ github.sha }}"
